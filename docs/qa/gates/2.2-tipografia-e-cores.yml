story_title: "Tipografia e Cores"
gate: CONCERNS
status_reason: "Implementação correcta do AC1 e AC3–AC5. AC2 tem limitação: o grupo 'Light' em ThemeGroup usa a classe CSS '.light' que não existe em globals.css, fazendo com que em dark mode ambos os grupos exibam cores escuras. Cobertura de testes parcial (3/8 exemplos tipográficos)."
reviewer: "Quinn (Test Architect)"
updated: "2026-03-27T20:47:00.000Z"

top_issues:
  - severity: medium
    category: code
    description: "ThemeGroup aplica className '.light' ao container do grupo claro, mas globals.css não define seletor .light — apenas :root e .dark. Em dark mode, o grupo 'Light' herda as variáveis CSS escuras do <html> e não as sobrepõe, exibindo cores escuras no lugar das claras."
    recommendation: "Adicionar .light { /* mesmo conteúdo de :root */ } em globals.css, OU usar atributo data-theme='light' com variável CSS scoped, OU definir as variáveis inline no ThemeGroup para o tema claro."
    suggested_owner: dev
    refs:
      - homeos/src/components/design-system/colors-section.tsx
      - homeos/src/app/globals.css

  - severity: low
    category: tests
    description: "Testes de TypographySection validam apenas 3 dos 8 textos de exemplo (Heading 1, Body text, code snippet). H2, H3, H4, Small text, Muted text não são verificados."
    recommendation: "Ampliar o teste 'exibe texto de exemplo para cada nível' para cobrir todos os 8 exemplos, ou adicionar iteração sobre o array de níveis."
    suggested_owner: dev
    refs:
      - homeos/tests/component/typography-section.test.tsx

  - severity: low
    category: tests
    description: "Nenhum teste verifica que o ColorSwatch (preview colorido) está renderizado no DOM — apenas o nome e a variável são testados. AC3 requer preview colorido."
    recommendation: "Adicionar verificação de que elementos com role/class de swatch estão presentes, ou verificar o atributo style."
    suggested_owner: dev
    refs:
      - homeos/tests/component/typography-section.test.tsx

